# C3 CELERITY - GHCR + Watchtower deployment
# Build source: .github/workflows/docker.yml
# Run: docker compose -f docker-compose.hub.yml up -d

services:
  # Redis - caching
  redis:
    image: redis:7-alpine
    container_name: hysteria-redis
    restart: always
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - hysteria-net

  # MongoDB
  mongo:
    image: mongo:7
    container_name: hysteria-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: hysteria
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-hysteria}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - hysteria-net

  # Hysteria Backend (custom image built by GitHub Actions)
  backend:
    image: ${CELERITY_IMAGE:-ghcr.io/acedevbas/celerityc3:latest}
    container_name: hysteria-backend
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      - ./logs:/app/logs
      - ./greenlock.d:/app/greenlock.d
      - ./backups:/app/backups
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://${MONGO_USER:-hysteria}:${MONGO_PASSWORD}@mongo:27017/hysteria?authSource=admin
      REDIS_URL: redis://redis:6379
      PORT: 3000
      USE_CADDY: "true"
    networks:
      - hysteria-net
      - web
    labels:
      caddy: x.twoheartsonecloud.ru
      caddy.reverse_proxy: "{{upstreams 3000}}"
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "celerity"

  # Auto-update only containers explicitly marked with the watchtower label.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: hysteria-watchtower
    restart: always
    labels:
      com.centurylinklabs.watchtower.scope: "celerity"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Uncomment this if the GHCR package stays private and the host is logged in:
      # - /root/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCOPE: "celerity"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      # Uncomment this if the GHCR package stays private:
      # WATCHTOWER_REGISTRY_AUTH: "true"
    networks:
      - hysteria-net

networks:
  hysteria-net:
    driver: bridge
  web:
    external: true

volumes:
  mongo_data:
